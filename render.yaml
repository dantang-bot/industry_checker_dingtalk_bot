services:
  - type: cron
    name: industry-checker-daily
    runtime: python
    schedule: "0 1 * * *"   # 09:00 SGT
    buildCommand: pip install -r requirements.txt
    startCommand: python daily_report.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: HUBSPOT_PRIVATE_APP_TOKEN
        sync: false
      - key: DINGTALK_ACCESS_TOKEN
        sync: false
      - key: DINGTALK_SECRET
        sync: false
